<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>storeos</title>
    
    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="application-name" content="StoreOS" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StoreOS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#00897B" />
    <meta name="msapplication-TileColor" content="#00897B" />

    <!-- Apple Touch Icons (critical for iPhone Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <link rel="shortcut icon" href="/icons/icon-96.png" />

    <!-- iPhone 14 Pro splash screen (2556x1179) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1179x2556.png"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
